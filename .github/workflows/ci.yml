name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ruff Lint Check
      run: |
        ruff check .

    - name: Run Bandit Security Scan
      run: |
        # -lll means: only exit non-zero (fail CI) when HIGH severity issues are found.
        # Medium and Low findings are printed in the log but do not block the build.
        # Current findings are all Low severity (subprocess usage and a false-positive
        # token reset) — intentional, well-guarded patterns in this codebase.
        bandit -r pr-review-agent/ --exclude pr-review-agent/venv -lll

    - name: Run Pytest Suite
      run: |
        pytest tests/
